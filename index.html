<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelTV Marbella</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#101216">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #101216;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-hover: rgba(0, 120, 255, 0.15);
            --accent-color: #0078ff;
            --border-hover: #0078ff;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Forzamos resolución estricta 1920x1080 sin scroll */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- ENCABEZADO --- */
        header {
            height: 120px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .hotel-logo {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .hotel-logo strong {
            color: var(--accent-color);
            font-weight: 700;
        }

        .info-status {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .weather-widget i { font-size: 32px; color: #ffb300; }

        #clock {
            font-size: 44px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 60px 60px 60px;
        }

        /* --- PESTAÑAS (NAVEGACIÓN) --- */
        .tabs-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 22px;
            font-weight: 500;
            padding: 14px 32px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .tab-btn i { font-size: 28px; }

        .tab-btn.active {
            color: #fff;
            background: var(--accent-color);
            box-shadow: 0 8px 25px rgba(0, 120, 255, 0.35);
        }

        .tab-btn:hover:not(.active), .tab-btn:focus {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        /* --- SECCIONES DE CONTENIDO --- */
        .tab-content {
            display: none;
            height: 680px;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tab-content.active {
            display: block;
        }

        /* --- REJILLA DE APLICACIONES --- */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 35px;
            height: 100%;
            align-content: center;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 24px;
            height: 380px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.25s ease;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .app-card:hover, .app-card:focus {
            transform: translateY(-10px);
            background: var(--card-hover);
            border-color: var(--border-hover);
            box-shadow: 0 20px 40px rgba(0, 120, 255, 0.25);
            outline: none;
        }

        .app-card i { font-size: 90px; }

        .app-card span {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Personalización de colores de apps */
        .app-tv i { color: #2ecc71; }
        .app-youtube i { color: #ff0000; }
        .app-tivify i { color: #ff6f00; }
        .app-disney i { color: #00d2ff; }

        /* --- CUADRÍCULA DE CÁMARAS DGT --- */
        .camera-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            height: 100%;
        }

        .camera-card {
            background: #161920;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 320px;
        }

        .camera-card:hover, .camera-card:focus {
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(0, 120, 255, 0.15);
        }

        .camera-title {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: 500;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2;
            backdrop-filter: blur(4px);
        }

        .dgt-cam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        /* --- PESTAÑA: TIEMPO SEMANAL --- */
        .weather-weekly-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 20px;
            height: 100%;
            align-items: center;
        }

        .weather-day-card {
            background: var(--card-bg);
            height: 480px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 30px 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .weather-day-card .day-name { 
            font-size: 24px; 
            font-weight: 700; 
            color: rgba(255,255,255,0.8); 
        }
        
        .weather-day-card i { font-size: 70px; color: #ffb300; }
        
        .weather-day-card .temp-range { font-size: 26px; font-weight: 500; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <div class="hotel-logo">Marbella<strong>HotelTV</strong></div>
        <div class="info-status">
            <div class="weather-widget">
                <i class="material-icons">wb_sunny</i>
                <span id="current-temp">25°C</span>
                <span style="font-size: 18px; opacity: 0.6; margin-left: 5px;">Marbella</span>
            </div>
            <div id="clock">00:00</div>
        </div>
    </header>

    <main>
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="openTab('inicio')">
                <i class="material-icons">home</i> Inicio
            </button>
            <button class="tab-btn" onclick="openTab('trafico')">
                <i class="material-icons">traffic</i> Cámaras de Tráfico
            </button>
            <button class="tab-btn" onclick="openTab('tiempo-semanal')">
                <i class="material-icons">wb_sunny</i> El Tiempo 7 Días
            </button>
        </nav>

        <div id="inicio" class="tab-content active">
            <div class="apps-grid">
                <a href="intent://#Intent;package=ar.tvplayer.tv;end" class="app-card app-tv" onclick="fallbackApp(event, 'https://play.google.com/store/apps/details?id=ar.tvplayer.tv')">
                    <i class="material-icons">tv</i>
                    <span>Televisión en Vivo</span>
                </a>
                <a href="intent://#Intent;package=com.google.android.youtube.tv;end" class="app-card app-youtube" onclick="fallbackApp(event, 'https://www.youtube.com/tv')">
                    <i class="material-icons">smart_display</i>
                    <span>YouTube</span>
                </a>
                <a href="intent://#Intent;package=es.tvup.tivify;end" class="app-card app-tivify" onclick="fallbackApp(event, 'https://www.tivify.tv')">
                    <i class="material-icons">live_tv</i>
                    <span>Tivify</span>
                </a>
                <a href="intent://#Intent;package=com.disney.disneyplus;end" class="app-card app-disney" onclick="fallbackApp(event, 'https://www.disneyplus.com')">
                    <i class="material-icons">movie</i>
                    <span>Disney+</span>
                </a>
            </div>
        </div>

        <div id="trafico" class="tab-content">
            <div class="camera-grid">
                <div class="camera-card">
                    <div class="camera-title">A-7 Centro / La Cañada</div>
                    <img class="dgt-cam" src="https://etraffic.dgt.es/camarasEtraffic/1548.jpg" alt="La Cañada">
                </div>
                <div class="camera-card">
                    <div class="camera-title">A-355 / Ojén</div>
                    <img class="dgt-cam" src="https://etraffic.dgt.es/camarasEtraffic/1547.jpg" alt="Ojén">
                </div>
                <div class="camera-card">
                    <div class="camera-title">A-7 Marbella Este</div>
                    <img class="dgt-cam" src="https://etraffic.dgt.es/camarasEtraffic/200.jpg" alt="Marbella Este">
                </div>
                <div class="camera-card">
                    <div class="camera-title">A-7 Nueva Andalucía</div>
                    <img class="dgt-cam" src="https://etraffic.dgt.es/camarasEtraffic/198.jpg" alt="Nueva Andalucía">
                </div>
                <div class="camera-card">
                    <div class="camera-title">A-7 Puerto Banús</div>
                    <img class="dgt-cam" src="https://etraffic.dgt.es/camarasEtraffic/197.jpg" alt="Puerto Banús">
                </div>
            </div>
        </div>

        <div id="tiempo-semanal" class="tab-content">
            <div class="weather-weekly-grid" id="weekly-forecast">
                </div>
        </div>
    </main>

    <script>
        // Reloj Dinámico
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Control de Pestañas
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            const targetBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(tabId));
            if(targetBtn) targetBtn.classList.add('active');
        }

        // Simulación Dinámica Clima Marbella
        const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        function initWeather() {
            const grid = document.getElementById('weekly-forecast');
            const hoy = new Date().getDay();
            let html = '';
            for(let i = 0; i < 7; i++) {
                const nombreDia = i === 0 ? 'Hoy' : dias[(hoy + i) % 7];
                const tMin = Math.floor(Math.random() * (18 - 15) + 15);
                const tMax = Math.floor(Math.random() * (29 - 24) + 24);
                html += `
                    <div class="weather-day-card">
                        <span class="day-name">${nombreDia}</span>
                        <i class="material-icons">wb_sunny</i>
                        <span class="temp-range">${tMax}° / ${tMin}°</span>
                    </div>`;
            }
            grid.innerHTML = html;
        }
        initWeather();

        // Interceptor de Enlaces de Android TV (Intents sin errores)
        function fallbackApp(event, webUrl) {
            event.preventDefault();
            const appUrl = event.currentTarget.getAttribute('href');
            
            try {
                window.location.href = appUrl;
            } catch (e) {
                window.open(appUrl, '_self');
            }

            // Salvaguarda si la app nativa no está instalada en la tele
            setTimeout(() => { 
                if (!document.hidden) window.open(webUrl, '_blank'); 
            }, 1800);
        }

        // Bucle de refresco de cámaras de tráfico (Cada 15 segundos sin parpadeo)
        function refreshCameras() {
            const images = document.querySelectorAll('.dgt-cam');
            const timestamp = new Date().getTime();
            images.forEach(img => {
                const baseUrl = img.src.split('?')[0];
                img.src = `${baseUrl}?t=${timestamp}`;
            });
        }
        setInterval(refreshCameras, 15000);

        // Registro Service Worker oficial
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA operativa'))
                    .catch(err => console.log('Error de Service Worker', err));
            });
        }
    </script>
</body>
</html>
